<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>INNOVATIVE KNITEX LTD</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.login-box{
    width:450px;
    background:#1e293b;
    border-radius:20px;
    padding:30px;
    box-shadow:0 0 30px rgba(0,0,0,.4);
}

.company-header{
    text-align:center;
}

.bismillah{
    font-size:30px;
    font-weight:bold;
    color:#16a34a;
    margin-bottom:10px;
}

.company-logo{
    max-width:350px;
    max-height:120px;
    width:auto;
    height:auto;
    object-fit:contain;
    display:block;
    margin:0 auto 10px auto;
}

.company-header h1{
    color:#00ff99;
    font-size:28px;
    margin-bottom:5px;
}

.company-header p{
    color:#cbd5e1;
    font-size:14px;
}

.input-group{
    margin-top:20px;
}

.input-group input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#0f172a;
    color:white;
}

.login-btn{
    width:100%;
    margin-top:15px;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#16a34a;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.login-btn:hover{
    background:#15803d;
}

</style>

</head>

<body>

<div class="login-box">

    <div class="company-header">

        <div class="bismillah">
            ﷽
        </div>

        <img src="logo.png" alt="Company Logo" class="company-logo">

        <h1>INNOVATIVE KNITEX LTD</h1>

        <p>Smart TNA ERP & Production Management System</p>

    </div>

    <div class="input-group">
        <input type="email" placeholder="Email">
    </div>

    <div class="input-group">
        <input type="password" placeholder="Password">
    </div>

    <button class="login-btn">
        Login
    </button>

</div>

</body>

</html>
