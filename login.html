<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart TNA BD - Login</title>

<!-- Icons -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{

    margin:0;
    padding:0;

    background:#0f172a;

    font-family:Arial;

    color:white;

    display:flex;

    justify-content:center;

    align-items:center;

    height:100vh;
}

.login-box{

    width:380px;

    background:#1e293b;

    padding:35px;

    border-radius:20px;

    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.logo{

    text-align:center;

    margin-bottom:25px;
}

.logo h1{

    margin:0;

    color:#00ff99;

    font-size:32px;
}

.logo p{

    color:#cbd5e1;

    margin-top:10px;
}

.input-box{

    margin-bottom:20px;
}

.input-box label{

    display:block;

    margin-bottom:8px;

    color:#cbd5e1;
}

.input-box input,
.input-box select{

    width:100%;

    padding:14px;

    border:none;

    border-radius:10px;

    background:#0f172a;

    color:white;

    font-size:15px;

    outline:none;

    box-sizing:border-box;
}

.input-box input:focus,
.input-box select:focus{

    border:1px solid #00ff99;
}

.login-btn{

    width:100%;

    padding:15px;

    border:none;

    border-radius:12px;

    background:#00aa66;

    color:white;

    font-size:18px;

    cursor:pointer;

    font-weight:bold;

    margin-top:10px;
}

.login-btn:hover{

    background:#008844;
}

.demo{

    margin-top:25px;

    background:#0f172a;

    padding:15px;

    border-radius:10px;

    font-size:14px;

    color:#cbd5e1;
}

.footer{

    text-align:center;

    margin-top:20px;

    color:#94a3b8;

    font-size:13px;
}

.icon{

    margin-right:8px;

    color:#00ff99;
}

@media(max-width:500px){

    .login-box{

        width:90%;
    }

}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">

<h1>🧵 SMART TNA BD</h1>

<p>Garments ERP & Production System</p>

</div>

<form>

<div class="input-box">

<label>
<i class="fa-solid fa-building icon"></i>
Department
</label>

<select>

<option>Merchandising</option>

<option>Knitting</option>

<option>Dyeing</option>

<option>Sample</option>

<option>Lab</option>

<option>ACC / Store</option>

<option>Cutting</option>

<option>Print</option>

<option>Embroidery</option>

<option>Sewing</option>

<option>Finishing</option>

<option>Commercial / Shipment</option>

<option>Admin</option>

</select>

</div>

<div class="input-box">

<label>
<i class="fa-solid fa-user icon"></i>
Username
</label>

<input
type="text"
placeholder="Enter username">

</div>

<div class="input-box">

<label>
<i class="fa-solid fa-lock icon"></i>
Password
</label>

<input
type="password"
placeholder="Enter password">

</div>

<button
type="button"
class="login-btn"
onclick="login()">

<i class="fa-solid fa-right-to-bracket"></i>

Login

</button>

</form>

<div class="demo">

<b>Demo Login:</b><br><br>

Username:
admin<br>

Password:
1234

</div>

<div class="footer">

Made for Bangladesh Garments Industry 🇧🇩

</div>

</div>

<script>

function login(){

    let username =
        document.querySelector(
            'input[type=\"text\"]'
        ).value;

    let password =
        document.querySelector(
            'input[type=\"password\"]'
        ).value;

    if(username === "admin"
       && password === "1234"){

        alert("Login Successful!");

        window.location.href =
            "index.html";

    }

    else{

        alert("Wrong Username or Password");

    }

}

</script>

</body>
</html>
