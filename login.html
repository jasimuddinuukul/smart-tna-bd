<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INNOVATIVE KNITEX LTD - Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.login-box{
    width:450px;
    background:#1e293b;
    border-radius:20px;
    padding:30px;
    box-shadow:0 0 30px rgba(0,0,0,.4);
}

.company-header{
    text-align:center;
    margin-bottom:25px;
}

.bismillah{
    font-size:30px;
    color:#22c55e;
    margin-bottom:10px;
}

.company-logo{
    max-width:280px;
    max-height:100px;
    object-fit:contain;
    margin-bottom:10px;
}

.company-header h1{
    color:#00ff99;
    font-size:28px;
    margin-bottom:5px;
}

.company-header p{
    color:#cbd5e1;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    color:#e2e8f0;
    margin-bottom:8px;
}

.input-group input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#0f172a;
    color:white;
}

.input-group input:focus{
    outline:2px solid #00ff99;
}

.login-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#16a34a;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.login-btn:hover{
    background:#15803d;
}

.status{
    text-align:center;
    margin-top:15px;
    color:#facc15;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#94a3b8;
    font-size:13px;
}

</style>
</head>

<body>

<div class="login-box">

<div class="company-header">

<div class="bismillah">
﷽
</div>

<img src="logo.png" alt="Logo" class="company-logo">

<h1>INNOVATIVE KNITEX LTD</h1>

<p>Smart TNA ERP & Production Management System</p>

</div>

<div class="input-group">
<label><i class="fa-solid fa-envelope"></i> Email</label>
<input type="email" id="email" placeholder="Enter Email">
</div>

<div class="input-group">
<label><i class="fa-solid fa-lock"></i> Password</label>
<input type="password" id="password" placeholder="Enter Password">
</div>

<button class="login-btn" onclick="loginUser()">
<i class="fa-solid fa-right-to-bracket"></i>
Login
</button>

<div class="status" id="status"></div>

<div class="footer">
© INNOVATIVE KNITEX LTD
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    /* PASTE YOUR FIREBASE CONFIG HERE */
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.loginUser = async function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

document.getElementById("status").innerHTML =
"Checking User...";

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

const usersSnapshot =
await getDocs(collection(db,"users"));

let role = "";

usersSnapshot.forEach(doc=>{

const data = doc.data();

if(data.email === email){

role = data.role;

}

});

if(role==="Admin"){

window.location.href="dashboard.html";

}

else if(role==="Management"){

window.location.href="dashboard.html";

}

else if(role==="Merchandising"){

window.location.href="merchandising.html";

}

else if(role==="Knitting" || role==="Dyeing"){

window.location.href="knitting-dyeing.html";

}

else if(role==="Laboratory"){

window.location.href="laboratory.html";

}

else if(role==="Sample"){

window.location.href="sample.html";

}

else if(
role==="Cutting" ||
role==="Print" ||
role==="Embroidery"
){

window.location.href="cutting-print.html";

}

else if(
role==="Sewing" ||
role==="Finishing"
){

window.location.href="sewing-finishing.html";

}

else{

alert("Role Not Assigned");

}

}
catch(error){

document.getElementById("status").innerHTML =
error.message;

}

}

</script>

</body>
</html>
