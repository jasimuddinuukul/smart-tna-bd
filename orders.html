<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// FIREBASE CONFIG

const firebaseConfig = {

apiKey: "AIzaSyBL7l-SkL6ha9FQsnnsQmGpqHg72szd8tQ",
  authDomain: "smart-tna-bd.firebaseapp.com",
  projectId: "smart-tna-bd",
  storageBucket: "smart-tna-bd.firebasestorage.app",
  messagingSenderId: "372049573207",
  appId: "1:372049573207:web:571beae951f9aa4b47fa12"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let editId = null;

// ========================
// ADD COLOR ROW
// ========================

window.addColorRow = function(){

let div = document.createElement("div");

div.className = "color-row";

div.innerHTML = `

<input
type="text"
class="color"
placeholder="Color Name">

<input
type="number"
class="qty"
placeholder="Quantity"
oninput="calculateOrderQty()">

<button onclick="this.parentElement.remove();calculateOrderQty();">

❌ Remove

</button>

`;

document
.getElementById("colorContainer")
.appendChild(div);

}

// DEFAULT COLOR ROW

addColorRow();

// ========================
// AUTO ORDER QTY
// ========================

window.calculateOrderQty = function(){

let totalQty = 0;

document.querySelectorAll(".qty")
.forEach(input=>{

totalQty += Number(input.value) || 0;

});

document.getElementById("orderQty").value =
totalQty;

}

// ========================
// AUTO LEAD TIME
// ========================

document
.getElementById("orderDate")
.addEventListener("change", calculateLeadTime);

document
.getElementById("shipdate")
.addEventListener("change", calculateLeadTime);

function calculateLeadTime(){

let orderDate =
document.getElementById("orderDate").value;

let shipdate =
document.getElementById("shipdate").value;

if(orderDate && shipdate){

let start = new Date(orderDate);

let end = new Date(shipdate);

let diffTime = end - start;

let diffDays =
Math.ceil(diffTime / (1000*60*60*24));

document.getElementById("leadtime").value =
diffDays;

}

}

// ========================
// SAVE ORDER
// ========================

window.saveOrder = async function(){

let buyer =
document.getElementById("buyer").value;

let ikl =
document.getElementById("ikl").value;

let style =
document.getElementById("style").value;

let item =
document.getElementById("item").value;

let merchandiser =
document.getElementById("merchandiser").value;

let fabrication =
document.getElementById("fabrication").value;

let orderDate =
document.getElementById("orderDate").value;

let shipdate =
document.getElementById("shipdate").value;

let leadtime =
document.getElementById("leadtime").value;

let orderQty =
document.getElementById("orderQty").value;

let colors = [];

document.querySelectorAll(".color-row")
.forEach(row=>{

let color =
row.querySelector(".color").value;

let qty =
Number(row.querySelector(".qty").value);

if(color && qty){

colors.push({
color,
qty
});

}

});

let orderData = {

buyer,
ikl,
style,
item,

merchandiser,
fabrication,

orderDate,
shipdate,
leadtime,

orderQty,

colors,

Merchandising:"Pending",
Knitting:"Pending",
Dyeing:"Pending",
Cutting:"Pending",
Sewing:"Pending",
Finishing:"Pending"

};

if(editId){

await updateDoc(
doc(db,"orders",editId),
orderData
);

alert("Order Updated Successfully");

editId = null;

}else{

await addDoc(
collection(db,"orders"),
orderData
);

alert("Order Saved Successfully");

}

clearForm();

loadOrders();

}

// ========================
// CLEAR FORM
// ========================

function clearForm(){

document.getElementById("buyer").value = "";
document.getElementById("ikl").value = "";
document.getElementById("style").value = "";
document.getElementById("item").value = "";
document.getElementById("merchandiser").value = "";
document.getElementById("fabrication").value = "";
document.getElementById("orderDate").value = "";
document.getElementById("shipdate").value = "";
document.getElementById("leadtime").value = "";
document.getElementById("orderQty").value = "";

document.getElementById("colorContainer").innerHTML = "";

addColorRow();

}
