<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Smart TNA BD - Order Entry</title>

<style>

body{

margin:0;
padding:0;
background:#0f172a;
font-family:Arial;
color:white;

}

header{

background:#111827;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
color:#00ff99;

}

.container{

max-width:1700px;
margin:auto;
padding:20px;

}

.card{

background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;

}

.form-grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;

}

.input-box label{

display:block;
margin-bottom:8px;

}

.input-box input{

width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#0f172a;
color:white;
box-sizing:border-box;

}

button{

background:#00aa66;
color:white;
border:none;
padding:12px 18px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
margin-top:10px;

}

button:hover{

background:#008844;

}

.delete-btn{

background:#dc2626;

}

.delete-btn:hover{

background:#b91c1c;

}

.color-section{

margin-top:20px;
padding:20px;
background:#111827;
border-radius:12px;

}

.color-row{

display:grid;
grid-template-columns:2fr 1fr;
gap:15px;
margin-bottom:15px;

}

.total-box{

margin-top:20px;
font-size:22px;
font-weight:bold;
color:#00ff99;

}

table{

width:100%;
border-collapse:collapse;
margin-top:20px;

}

table th,
table td{

border:1px solid #334155;
padding:12px;
text-align:center;

}

table th{

background:#111827;
color:#00ff99;

}

.table-container{

overflow:auto;

}

</style>

</head>

<body>

<header>

📦 SMART TNA BD - ORDER ENTRY SYSTEM

</header>

<div class="container">

<div class="card">

<h2>🧵 Create New Order</h2>

<div class="form-grid">

<div class="input-box">

<label>Buyer Name</label>

<input type="text" id="buyer">

</div>

<div class="input-box">

<label>IKL No</label>

<input type="text" id="ikl">

</div>

<div class="input-box">

<label>Style</label>

<input type="text" id="style">

</div>

<div class="input-box">

<label>Shipment Date</label>

<input type="date" id="shipdate">

</div>

</div>

<div class="color-section">

<h3>🎨 Color Wise Quantity</h3>

<div id="colorContainer">

<div class="color-row">

<input
type="text"
placeholder="Color Name"
class="colorName">

<input
type="number"
placeholder="Quantity"
class="colorQty"
oninput="calculateTotal()">

</div>

</div>

<button onclick="addColorRow()">

➕ Add More Color

</button>

<div class="total-box">

Total Quantity:
<span id="totalQty">0</span>

PCS

</div>

</div>

<button onclick="saveOrder()">

💾 Save Order

</button>

</div>

<div class="card">

<h2>📋 Live Orders</h2>

<div class="table-container">

<table id="orderTable">

<tr>

<th>Buyer</th>
<th>IKL No</th>
<th>Style</th>
<th>Shipment</th>
<th>Color Breakdown</th>
<th>Total Qty</th>
<th>Action</th>

</tr>

</table>

</div>

</div>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// FIREBASE CONFIG

const firebaseConfig = {

apiKey: "AIzaSyBL7l-SkL6ha9FQsnnsQmGpqHg72szd8tQ",

authDomain: "smart-tna-bd.firebaseapp.com",

projectId: "smart-tna-bd",

storageBucket: "smart-tna-bd.firebasestorage.app",

messagingSenderId: "372049573207",

appId: "1:372049573207:web:571beae951f9aa4b47fa12"

};

// INIT

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

// ADD COLOR ROW

window.addColorRow = function(){

let container =

document.getElementById("colorContainer");

container.innerHTML += `

<div class="color-row">

<input
type="text"
placeholder="Color Name"
class="colorName">

<input
type="number"
placeholder="Quantity"
class="colorQty"
oninput="calculateTotal()">

</div>

`;

}

// CALCULATE TOTAL

window.calculateTotal = function(){

let qtyInputs =

document.querySelectorAll(".colorQty");

let total = 0;

qtyInputs.forEach(input=>{

total += Number(input.value || 0);

});

document.getElementById("totalQty")
.innerText = total;

}

// SAVE ORDER

window.saveOrder = async function(){

let buyer =
document.getElementById("buyer").value;

let ikl =
document.getElementById("ikl").value;

let style =
document.getElementById("style").value;

let shipdate =
document.getElementById("shipdate").value;

let colorNames =
document.querySelectorAll(".colorName");

let colorQtys =
document.querySelectorAll(".colorQty");

let colors = [];

let totalQty = 0;

for(let i=0; i<colorNames.length; i++){

let color =
colorNames[i].value;

let qty =
Number(colorQtys[i].value);

if(color && qty){

colors.push({

color,
qty

});

totalQty += qty;

}

}

await addDoc(

collection(db, "orders"),

{

buyer,
ikl,
style,
shipdate,
colors,
totalQty,

Merchandising:"Pending",
Knitting:"Pending",
Dyeing:"Pending",
Sample:"Pending",
Lab:"Pending",
Cutting:"Pending",
Print:"Pending",
Embroidery:"Pending",
Sewing:"Pending",
Finishing:"Pending",
Shipment:"Pending"

}

);

alert("Order Saved!");

loadOrders();

}

// LOAD ORDERS

async function loadOrders(){

const querySnapshot =

await getDocs(collection(db, "orders"));

let table =

document.getElementById("orderTable");

table.innerHTML = `

<tr>

<th>Buyer</th>
<th>IKL No</th>
<th>Style</th>
<th>Shipment</th>
<th>Color Breakdown</th>
<th>Total Qty</th>
<th>Action</th>

</tr>

`;

querySnapshot.forEach((docItem)=>{

let data = docItem.data();

let colorHTML = "";

if(data.colors){

data.colors.forEach(c=>{

colorHTML += `

${c.color}
=
${c.qty} PCS
<br>

`;

});

}

table.innerHTML += `

<tr>

<td>${data.buyer || ""}</td>

<td>${data.ikl || ""}</td>

<td>${data.style || ""}</td>

<td>${data.shipdate || ""}</td>

<td>${colorHTML}</td>

<td>

${data.totalQty || 0}

PCS

</td>

<td>

<button
class="delete-btn"
onclick="deleteOrder('${docItem.id}')">

Delete

</button>

</td>

</tr>

`;

});

}

// DELETE ORDER

window.deleteOrder = async function(id){

let confirmDelete =

confirm("Delete this order?");

if(confirmDelete){

await deleteDoc(

doc(db, "orders", id)

);

alert("Order Deleted!");

loadOrders();

}

}

// LOAD

loadOrders();

</script>

</body>

</html>
