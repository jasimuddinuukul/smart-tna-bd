<script type="module">

// Firebase Import
import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
getDocs

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Firebase Config
const firebaseConfig = {

apiKey: "AIzaSyBL7l-SkL6ha9FQsnnsQmGpqHg72szd8tQ",

authDomain: "smart-tna-bd.firebaseapp.com",

projectId: "smart-tna-bd",

storageBucket: "smart-tna-bd.firebasestorage.app",

messagingSenderId: "372049573207",

appId: "1:372049573207:web:571beae951f9aa4b47fa12"

};

// Initialize Firebase
const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

// SAVE ORDER
window.addOrder = async function(){

let buyer =
document.getElementById("buyer").value;

let ikl =
document.getElementById("ikl").value;

let style =
document.getElementById("style").value;

let qty =
document.getElementById("qty").value;

let fabric =
document.getElementById("fabric").value;

let shipdate =
document.getElementById("shipdate").value;

let status =
document.getElementById("status").value;

if(buyer === "" || ikl === ""){

alert("Please fill required fields");

return;

}

try{

await addDoc(

collection(db, "orders"),

{

buyer,
ikl,
style,
qty,
fabric,
shipdate,
status

}

);

alert("Order Saved Successfully!");

loadOrders();

}

catch(error){

alert("Error: " + error);

}

};

// LOAD ORDERS
async function loadOrders(){

const querySnapshot =

await getDocs(collection(db, "orders"));

let table =

document.getElementById("orderTable");

// remove old rows
table.innerHTML = `

<tr>

<th>Buyer</th>
<th>IKL No</th>
<th>Style</th>
<th>Order Qty</th>
<th>Fabric</th>
<th>Shipment Date</th>
<th>Status</th>

</tr>

`;

querySnapshot.forEach((doc) => {

let data = doc.data();

table.innerHTML += `

<tr>

<td>${data.buyer}</td>

<td>${data.ikl}</td>

<td>${data.style}</td>

<td>${data.qty}</td>

<td>${data.fabric}</td>

<td>${data.shipdate}</td>

<td>${data.status}</td>

</tr>

`;

});

}

// Load data on page start
loadOrders();

</script>
