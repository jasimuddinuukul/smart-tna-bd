<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMART TNA BD - ADMIN PANEL V1</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0f172a;color:#fff}
header{background:#111827;padding:20px;text-align:center;color:#00ff99;font-size:28px;font-weight:bold}
.container{max-width:1400px;margin:auto;padding:20px}
.card{background:#1e293b;padding:20px;border-radius:12px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
input,select,button{width:100%;padding:12px;border:none;border-radius:8px;box-sizing:border-box}
input,select{background:#0f172a;color:#fff}
button{background:#16a34a;color:#fff;font-weight:bold;cursor:pointer}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #334155;padding:10px;text-align:center}
th{background:#111827;color:#00ff99}
</style>
</head>
<body>
<header>SMART TNA BD ERP - ADMIN PANEL V1</header>
<div class="container">
<div class="card">
<h2>Create User</h2>
<div class="grid">
<input id="employeeId" placeholder="Employee ID">
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="defaultPassword" value="12345678" placeholder="Default Password">
<select id="department">
<option>Admin</option><option>Management</option><option>Merchandising</option>
<option>Sample</option><option>Laboratory</option><option>Knitting & Dyeing</option>
<option>Cutting</option><option>Print & Embroidery</option>
<option>Sewing</option><option>Finishing</option>
</select>
<select id="role"><option>Admin</option><option>User</option><option>Viewer</option></select>
<select id="active"><option value="true">Active</option><option value="false">Inactive</option></select>
</div>
<br><button>Save User</button>
</div>

<div class="card">
<h2>Search User</h2>
<input placeholder="Search Employee ID / Name / Email">
</div>

<div class="card">
<h2>User List</h2>
<table>
<tr>
<th>Employee ID</th><th>Name</th><th>Email</th><th>Department</th>
<th>Role</th><th>Status</th><th>Created At</th><th>Action</th>
</tr>
</table>
</div>
</div>
</body>
</html>
