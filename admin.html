<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>SMART TNA BD - Admin Panel</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

</head>

<body class="bg-light">

<div class="container py-4">

  <!-- HEADER -->

  <div class="card shadow">

    <div class="card-header bg-dark text-white">

      <h3>Admin User Management</h3>

    </div>

    <div class="card-body">

      <form id="userForm">

        <div class="row g-3">

          <!-- EMPLOYEE ID -->

          <div class="col-md-3">

            <label class="form-label">
              Employee ID
            </label>

            <input
              type="text"
              id="employeeId"
              class="form-control"
              required
            >

          </div>


          <!-- NAME -->

          <div class="col-md-3">

            <label class="form-label">
              Name
            </label>

            <input
              type="text"
              id="name"
              class="form-control"
              required
            >

          </div>


          <!-- EMAIL -->

          <div class="col-md-3">

            <label class="form-label">
              Email
            </label>

            <input
              type="email"
              id="email"
              class="form-control"
              required
            >

          </div>


          <!-- PASSWORD -->

          <div class="col-md-3">

            <label class="form-label">
              Default Password
            </label>

            <input
              type="text"
              id="defaultPassword"
              class="form-control"
              required
            >

          </div>


          <!-- DEPARTMENT -->

          <div class="col-md-4">

            <label class="form-label">
              Department
            </label>

            <select
              id="department"
              class="form-select"
            >

              <option>Admin</option>
              <option>Management</option>
              <option>Merchandising</option>
              <option>Sample</option>
              <option>Laboratory</option>
              <option>Knitting & Dyeing</option>
              <option>Cutting</option>
              <option>Print & Embroidery</option>
              <option>Sewing</option>
              <option>Finishing</option>

            </select>

          </div>


          <!-- ROLE -->

          <div class="col-md-4">

            <label class="form-label">
              Role
            </label>

            <select
              id="role"
              class="form-select"
            >

              <option>Admin</option>
              <option>User</option>
              <option>Viewer</option>

            </select>

          </div>


          <!-- STATUS -->

          <div class="col-md-4">

            <label class="form-label">
              Status
            </label>

            <select
              id="active"
              class="form-select"
            >

              <option value="true">
                Active
              </option>

              <option value="false">
                Inactive
              </option>

            </select>

          </div>

        </div>


        <!-- BUTTON -->

        <div class="mt-4">

          <button
            type="submit"
            class="btn btn-primary"
          >

            Save User

          </button>

        </div>

      </form>

    </div>

  </div>



  <!-- SEARCH -->

  <div class="card mt-4 shadow">

    <div class="card-body">

      <input
        type="text"
        id="searchInput"
        class="form-control"
        placeholder="Search User..."
      >

    </div>

  </div>



  <!-- USER TABLE -->

  <div class="card mt-4 shadow">

    <div class="card-header bg-primary text-white">

      <h4>User List</h4>

    </div>

    <div class="card-body table-responsive">

      <table class="table table-bordered table-hover">

        <thead>

          <tr>

            <th>Employee ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Department</th>
            <th>Role</th>
            <th>Status</th>
            <th>Action</th>

          </tr>

        </thead>

        <tbody id="userTableBody"></tbody>

      </table>

    </div>

  </div>

</div>



<!-- JAVASCRIPT -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  getDocs,
  getDoc,
  setDoc,
  doc,
  deleteDoc,
  updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



// FIREBASE CONFIG

const firebaseConfig = {

  apiKey: "AIzaSyBL7l-SkL6ha9FQsnnsQmGpqHg72szd8tQ",

  authDomain: "smart-tna-bd.firebaseapp.com",

  projectId: "smart-tna-bd",

  storageBucket: "smart-tna-bd.firebasestorage.app",

  messagingSenderId: "372049573207",

  appId: "1:372049573207:web:571beae951f9aa4b47fa12"

};


// INITIALIZE

const app =
  initializeApp(firebaseConfig);

const auth =
  getAuth(app);

const db =
  getFirestore(app);



// VARIABLES

const userForm =
  document.getElementById('userForm');

const userTableBody =
  document.getElementById('userTableBody');

const searchInput =
  document.getElementById('searchInput');

let editId = null;



// SAVE USER

userForm.addEventListener('submit', async (e) => {

  e.preventDefault();

  const employeeId =
    document.getElementById('employeeId').value;

  const name =
    document.getElementById('name').value;

  const email =
    document.getElementById('email').value;

  const defaultPassword =
    document.getElementById('defaultPassword').value;

  const department =
    document.getElementById('department').value;

  const role =
    document.getElementById('role').value;

  const active =
    document.getElementById('active').value === 'true';


  try {

    // UPDATE USER

    if(editId){

      await updateDoc(
        doc(db, 'users', editId),
        {

          employeeId,
          name,
          email,
          defaultPassword,
          department,
          role,
          active

        }
      );

      alert('User Updated');

      editId = null;

    }

    // CREATE USER

    else {

      const userCredential =
        await createUserWithEmailAndPassword(
          auth,
          email,
          defaultPassword
        );

      const uid =
        userCredential.user.uid;

      await setDoc(
        doc(db, 'users', uid),
        {

          employeeId,
          name,
          email,
          defaultPassword,
          department,
          role,
          active,
          createdAt: new Date()

        }
      );

      alert('User Created Successfully');

    }

    userForm.reset();

    loadUsers();

  }

  catch(error){

    console.error(error);

    alert(error.message);

  }

});



// LOAD USERS

async function loadUsers(){

  userTableBody.innerHTML = '';

  const querySnapshot =
    await getDocs(
      collection(db, 'users')
    );

  querySnapshot.forEach((docSnap)=>{

    const user =
      docSnap.data();

    const row = `

      <tr>

        <td>${user.employeeId}</td>

        <td>${user.name}</td>

        <td>${user.email}</td>

        <td>${user.department}</td>

        <td>${user.role}</td>

        <td>
          ${user.active ? 'Active' : 'Inactive'}
        </td>

        <td>

          <button
            class="btn btn-warning btn-sm"
            onclick="editUser('${docSnap.id}')"
          >

            Edit

          </button>

          <button
            class="btn btn-danger btn-sm"
            onclick="deleteUser('${docSnap.id}')"
          >

            Delete

          </button>

        </td>

      </tr>

    `;

    userTableBody.innerHTML += row;

  });

}

loadUsers();



// DELETE USER

window.deleteUser =
async function(id){

  const confirmDelete =
    confirm('Delete User ?');

  if(!confirmDelete) return;

  await deleteDoc(
    doc(db, 'users', id)
  );

  alert('User Deleted');

  loadUsers();

}



// EDIT USER

window.editUser =
async function(id){

  editId = id;

  const docRef =
    doc(db, "users", id);

  const docSnap =
    await getDoc(docRef);

  if(docSnap.exists()){

    let data =
      docSnap.data();

    document
      .getElementById("employeeId")
      .value =
      data.employeeId || "";

    document
      .getElementById("name")
      .value =
      data.name || "";

    document
      .getElementById("email")
      .value =
      data.email || "";

    document
      .getElementById("defaultPassword")
      .value =
      data.defaultPassword || "";

    document
      .getElementById("department")
      .value =
      data.department || "";

    document
      .getElementById("role")
      .value =
      data.role || "";

    document
      .getElementById("active")
      .value =
      String(data.active);

    window.scrollTo({

      top:0,
      behavior:"smooth"

    });

  }

}



// SEARCH USER

searchInput.addEventListener('keyup', ()=>{

  const filter =
    searchInput.value.toLowerCase();

  const rows =
    userTableBody
    .getElementsByTagName('tr');

  for(let i=0; i<rows.length; i++){

    const text =
      rows[i]
      .innerText
      .toLowerCase();

    rows[i].style.display =
      text.includes(filter)
      ? ''
      : 'none';

  }

});

</script>

</body>
</html>
