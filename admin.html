<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>SMART TNA BD - Admin</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

  <div class="card shadow">

    <div class="card-header bg-dark text-white">
      <h3>Admin User Management</h3>
    </div>

    <div class="card-body">

      <form id="userForm">

        <div class="row g-3">

          <div class="col-md-3">
            <label>Employee ID</label>
            <input type="text" id="employeeId" class="form-control" required>
          </div>

          <div class="col-md-3">
            <label>Name</label>
            <input type="text" id="name" class="form-control" required>
          </div>

          <div class="col-md-3">
            <label>Email</label>
            <input type="email" id="email" class="form-control" required>
          </div>

          <div class="col-md-3">
            <label>Default Password</label>
            <input type="text" id="defaultPassword" class="form-control" required>
          </div>

          <div class="col-md-4">
            <label>Department</label>

            <select id="department" class="form-select">

              <option>Admin</option>
              <option>Management</option>
              <option>Merchandising</option>
              <option>Sample</option>
              <option>Laboratory</option>
              <option>Knitting & Dyeing</option>
              <option>Cutting</option>
              <option>Print & Embroidery</option>
              <option>Sewing</option>
              <option>Finishing</option>

            </select>
          </div>

          <div class="col-md-4">
            <label>Role</label>

            <select id="role" class="form-select">

              <option>Admin</option>
              <option>User</option>
              <option>Viewer</option>

            </select>
          </div>

          <div class="col-md-4">
            <label>Status</label>

            <select id="active" class="form-select">

              <option value="true">Active</option>
              <option value="false">Inactive</option>

            </select>
          </div>

        </div>

        <div class="mt-4">

          <button class="btn btn-primary">
            Create User
          </button>

        </div>

      </form>

    </div>

  </div>


  <!-- SEARCH -->

  <div class="card mt-4 shadow">

    <div class="card-body">

      <input
        type="text"
        id="searchInput"
        class="form-control"
        placeholder="Search User..."
      >

    </div>

  </div>


  <!-- USER LIST -->

  <div class="card mt-4 shadow">

    <div class="card-header bg-primary text-white">
      <h4>User List</h4>
    </div>

    <div class="card-body table-responsive">

      <table class="table table-bordered table-hover">

        <thead>

          <tr>

            <th>Employee ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Department</th>
            <th>Role</th>
            <th>Status</th>
            <th>Action</th>

          </tr>

        </thead>

        <tbody id="userTableBody"></tbody>

      </table>

    </div>

  </div>

</div>

<script type="module" src="./js/admin.js"></script>

</body>
</html>
