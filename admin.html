<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SMART TNA BD - ADMIN PANEL</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

header{
background:#111827;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
color:#00ff99;
}

.container{
max-width:1800px;
margin:auto;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

h2{
color:#00ff99;
margin-bottom:15px;
}

.form-grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

input,
select,
button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
}

input,
select{
background:#0f172a;
color:white;
}

button{
background:#16a34a;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#15803d;
}

.search-box{
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

table th,
table td{
border:1px solid #334155;
padding:12px;
text-align:center;
}

table th{
background:#111827;
color:#00ff99;
}

.status-active{
color:#22c55e;
font-weight:bold;
}

.status-inactive{
color:#ef4444;
font-weight:bold;
}

.table-container{
overflow:auto;
}

</style>

</head>

<body>

<header>

SMART TNA BD ERP
ADMIN PANEL V1

</header>

<div class="container">

<!-- CREATE USER -->

<div class="card">

<h2>Create User</h2>

<div class="form-grid">

<div>
<label>Employee ID</label>
<input
type="text"
id="employeeId"
placeholder="ADMIN-001">
</div>

<div>
<label>Name</label>
<input
type="text"
id="name"
placeholder="ERP Admin">
</div>

<div>
<label>Email</label>
<input
type="email"
id="email"
placeholder="user@smarttnabd.com">
</div>

<div>
<label>Default Password</label>
<input
type="text"
id="defaultPassword"
value="12345678">
</div>

<div>
<label>Department</label>

<select id="department">

<option>Admin</option>

<option>Management</option>

<option>Merchandising</option>

<option>Sample</option>

<option>Laboratory</option>

<option>Knitting & Dyeing</option>

<option>Cutting</option>

<option>Print & Embroidery</option>

<option>Sewing</option>

<option>Finishing</option>

</select>

</div>

<div>
<label>Role</label>

<select id="role">

<option>Admin</option>

<option>User</option>

<option>Viewer</option>

</select>

</div>

<div>
<label>Status</label>

<select id="active">

<option value="true">
Active
</option>

<option value="false">
Inactive
</option>

</select>

</div>

</div>

<br>

<button id="saveUserBtn">

💾 Save User

</button>

</div>

<!-- SEARCH -->

<div class="card">

<h2>Search User</h2>

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Search Employee ID / Name / Email">

</div>

</div>

<!-- USER LIST -->

<div class="card">

<h2>User List</h2>

<div class="table-container">

<table id="userTable">

<tr>

<th>Employee ID</th>

<th>Name</th>

<th>Email</th>

<th>Department</th>

<th>Role</th>

<th>Status</th>

<th>Created At</th>

<th>Action</th>

</tr>

</table>

</div>

</div>

</div>
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
updateDoc,
doc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
const firebaseConfig = {
  let editId = null;
  
apiKey: "AIzaSyBL7l-SkL6ha9FQsnnsQmGpqHg72szd8tQ",

authDomain: "smart-tna-bd.firebaseapp.com",

projectId: "smart-tna-bd",

storageBucket: "smart-tna-bd.firebasestorage.app",

messagingSenderId: "372049573207",

appId: "1:372049573207:web:571beae951f9aa4b47fa12"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


// SAVE USER

async function saveUser(){

let employeeId =
document.getElementById("employeeId").value;

let name =
document.getElementById("name").value;

let email =
document.getElementById("email").value;

let defaultPassword =
document.getElementById("defaultPassword").value;

let department =
document.getElementById("department").value;

let role =
document.getElementById("role").value;

let active =
document.getElementById("active").value==="true";

let today =
new Date().toISOString().split("T")[0];

if(!employeeId || !name || !email){

alert("Please Fill All Required Fields");

return;

}

const userData = {

employeeId,
name,
email,
defaultPassword,
department,
role,
active,
createdAt:today

};

if(editId){

await updateDoc(

doc(db,"users",editId),

userData

);

alert("User Updated");

editId = null;

}
window.editUser =
async function(id){

const querySnapshot =

await getDocs(
collection(db,"users")
);

querySnapshot.forEach((docItem)=>{

if(docItem.id===id){

editId=id;

let data=
docItem.data();

document
.getElementById("employeeId")
.value=
data.employeeId || "";

document
.getElementById("name")
.value=
data.name || "";

document
.getElementById("email")
.value=
data.email || "";

document
.getElementById("defaultPassword")
.value=
data.defaultPassword || "";

document
.getElementById("department")
.value=
data.department || "";

document
.getElementById("role")
.value=
data.role || "";

document
.getElementById("active")
.value=
String(data.active);

window.scrollTo({

top:0,
behavior:"smooth"

});

}

});

}
else{

await addDoc(

collection(db,"users"),

userData

);

alert("User Saved");

}

clearForm();

loadUsers(<button
onclick="editUser('${docItem.id}')">

Edit

</button>

<button
onclick="deleteUser('${docItem.id}')">

Delete

</button>);

}  
// CLEAR FORM

function clearForm(){

document.getElementById("employeeId").value="";

document.getElementById("name").value="";

document.getElementById("email").value="";

document.getElementById("defaultPassword").value="12345678";

}


// LOAD USERS

async function loadUsers(){

const querySnapshot =

await getDocs(
collection(db,"users")
);

let table =

document.getElementById("userTable");

table.innerHTML = `

<tr>

<th>Employee ID</th>

<th>Name</th>

<th>Email</th>

<th>Department</th>

<th>Role</th>

<th>Status</th>

<th>Created At</th>

<th>Action</th>

</tr>

`;

querySnapshot.forEach((docItem)=>{

let data = docItem.data();

table.innerHTML += `

<tr>

<td>${data.employeeId || ""}</td>

<td>${data.name || ""}</td>

<td>${data.email || ""}</td>

<td>${data.department || ""}</td>

<td>${data.role || ""}</td>

<td>

${data.active
? '<span class="status-active">Active</span>'
: '<span class="status-inactive">Inactive</span>'}

</td>

<td>${data.createdAt || ""}</td>

<td>

<button
onclick="editUser('${docItem.id}')">

Edit

</button>

<button
onclick="deleteUser('${docItem.id}')">

Delete

</button>

}

loadUsers();
window.deleteUser =
async function(id){

let confirmDelete =

confirm(
"Delete User?"
);

if(!confirmDelete) return;

await deleteDoc(

doc(db,"users",id)

);

alert("User Deleted");

loadUsers();

}
</script>
</body>
</html>
