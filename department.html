<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Smart TNA BD - Department Details</title>

<style>

body{

margin:0;
padding:0;
background:#0f172a;
font-family:Arial;
color:white;

}

header{

background:#111827;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
color:#00ff99;

}

.container{

max-width:1800px;
margin:auto;
padding:20px;

}

.card{

background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;

}

h2{

color:#00ff99;

}

.form-grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;

}

.input-box label{

display:block;
margin-bottom:8px;

}

.input-box input,
.input-box select,
textarea{

width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#0f172a;
color:white;
box-sizing:border-box;

}

textarea{

height:100px;

}

button{

background:#00aa66;
color:white;
border:none;
padding:12px 18px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
margin-top:15px;

}

button:hover{

background:#008844;

}

table{

width:100%;
border-collapse:collapse;
margin-top:20px;

}

table th,
table td{

border:1px solid #334155;
padding:12px;
text-align:center;

}

table th{

background:#111827;
color:#00ff99;

}

.table-container{

overflow:auto;

}

</style>

</head>

<body>

<header>

🧵 SMART TNA BD - DEPARTMENT DETAILS

</header>

<div class="container">

<div class="card">

<h2>📦 Department Detail Entry</h2>

<div class="form-grid">

<div class="input-box">

<label>IKL No</label>

<input type="text" id="ikl">

</div>

<div class="input-box">

<label>Department</label>

<select id="department">

<option>Merchandising</option>

<option>Knitting & Dyeing</option>

<option>Cutting & Print</option>

<option>Sewing & Finishing</option>

</select>

</div>

<div class="input-box">

<label>Target Date</label>

<input type="date" id="targetDate">

</div>

<div class="input-box">

<label>Status</label>

<select id="status">

<option>Pending</option>
<option>Running</option>
<option>Delay</option>
<option>Complete</option>

</select>

</div>

</div>

<br>

<div class="input-box">

<label>Department Details</label>

<textarea
id="details"
placeholder="Write department details..."></textarea>

</div>

<div class="input-box">

<label>Delay Note</label>

<textarea
id="delayNote"
placeholder="Why delay?"></textarea>

</div>

<button onclick="saveDepartmentDetails()">

💾 Save / Update Department

</button>

</div>

<div class="card">

<h2>📋 Department Details Dashboard</h2>

<div class="table-container">

<table id="detailsTable">

<tr>

<th>Buyer</th>
<th>IKL</th>
<th>Department</th>
<th>Target Date</th>
<th>Status</th>
<th>Details</th>
<th>Delay Note</th>

</tr>

</table>

</div>

</div>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
getDocs,
updateDoc,
doc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// FIREBASE CONFIG

const firebaseConfig = {

apiKey: "AIzaSyBL7l-SkL6ha9FQsnnsQmGpqHg72szd8tQ",

authDomain: "smart-tna-bd.firebaseapp.com",

projectId: "smart-tna-bd",

storageBucket: "smart-tna-bd.firebasestorage.app",

messagingSenderId: "372049573207",

appId: "1:372049573207:web:571beae951f9aa4b47fa12"

};

// INIT

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

// SAVE DETAILS

window.saveDepartmentDetails = async function(){

let ikl =
document.getElementById("ikl").value;

let department =
document.getElementById("department").value;

let targetDate =
document.getElementById("targetDate").value;

let status =
document.getElementById("status").value;

let details =
document.getElementById("details").value;

let delayNote =
document.getElementById("delayNote").value;

const querySnapshot =

await getDocs(collection(db, "orders"));

querySnapshot.forEach(async(docItem)=>{

let data = docItem.data();

if(data.ikl === ikl){

await updateDoc(

doc(db, "orders", docItem.id),

{

[department + "_Target"]:
targetDate,

[department + "_Status"]:
status,

[department + "_Details"]:
details,

[department + "_Delay"]:
delayNote

}

);

alert("Department Updated!");

loadDetails();

}

});

}

// LOAD DETAILS

async function loadDetails(){

const querySnapshot =

await getDocs(collection(db, "orders"));

let table =

document.getElementById("detailsTable");

table.innerHTML = `

<tr>

<th>Buyer</th>
<th>IKL</th>
<th>Department</th>
<th>Target Date</th>
<th>Status</th>
<th>Details</th>
<th>Delay Note</th>

</tr>

`;

querySnapshot.forEach((docItem)=>{

let data = docItem.data();

let departments = [

"Merchandising",

"Knitting & Dyeing",

"Cutting & Print",

"Sewing & Finishing"

];

departments.forEach(dep=>{

if(data[dep + "_Status"]){

table.innerHTML += `

<tr>

<td>${data.buyer || ""}</td>

<td>${data.ikl || ""}</td>

<td>${dep}</td>

<td>

${data[dep + "_Target"] || "-"}

</td>

<td>

${data[dep + "_Status"] || "-"}

</td>

<td>

${data[dep + "_Details"] || "-"}

</td>

<td>

${data[dep + "_Delay"] || "-"}

</td>

</tr>

`;

}

});

});

}

// LOAD

loadDetails();

</script>

</body>

</html>
