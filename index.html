<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Smart TNA BD Dashboard</title>

<style>

body{

margin:0;
padding:0;
background:#0f172a;
font-family:Arial;
color:white;

}

header{

background:#111827;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
color:#00ff99;

}

.container{

padding:20px;

}

.card{

background:#1e293b;
padding:20px;
border-radius:15px;
overflow:auto;

}

h2{

color:#00ff99;

}

table{

width:100%;
border-collapse:collapse;
margin-top:20px;
min-width:2600px;

}

table th,
table td{

border:1px solid #334155;
padding:12px;
text-align:center;

}

table th{

background:#111827;
color:#00ff99;

}

.running{

color:#22c55e;
font-weight:bold;

}

.pending{

color:#facc15;
font-weight:bold;

}

.delay{

color:#ef4444;
font-weight:bold;

}

.complete{

color:#06b6d4;
font-weight:bold;

}

.footer{

text-align:center;
margin-top:30px;
color:#94a3b8;

}

</style>

</head>

<body>

<header>

🧵 SMART TNA BD - LIVE DASHBOARD

</header>

<div class="container">

<div class="card">

<h2>📦 Professional Garments TNA Dashboard</h2>

<table id="dashboardTable">

<tr>

<th>Buyer</th>
<th>IKL No</th>
<th>Style</th>
<th>Total Qty</th>
<th>Shipment Date</th>

<th>Merchandising</th>
<th>Knitting</th>
<th>Dyeing</th>
<th>Sample</th>
<th>Lab</th>
<th>Cutting</th>
<th>Print</th>
<th>Embroidery</th>
<th>Sewing</th>
<th>Finishing</th>
<th>Shipment</th>

</tr>

</table>

</div>

<div class="footer">

Made for Bangladesh Garments Industry 🇧🇩

</div>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
getDocs

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// FIREBASE CONFIG

const firebaseConfig = {

apiKey: "AIzaSyBL7l-SkL6ha9FQsnnsQmGpqHg72szd8tQ",

authDomain: "smart-tna-bd.firebaseapp.com",

projectId: "smart-tna-bd",

storageBucket: "smart-tna-bd.firebasestorage.app",

messagingSenderId: "372049573207",

appId: "1:372049573207:web:571beae951f9aa4b47fa12"

};

// INIT FIREBASE

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

// LOAD DASHBOARD

async function loadDashboard(){

const querySnapshot =

await getDocs(collection(db, "orders"));

let table =

document.getElementById("dashboardTable");

table.innerHTML = `

<tr>

<th>Buyer</th>
<th>IKL No</th>
<th>Style</th>
<th>Total Qty</th>
<th>Shipment Date</th>

<th>Merchandising</th>
<th>Knitting</th>
<th>Dyeing</th>
<th>Sample</th>
<th>Lab</th>
<th>Cutting</th>
<th>Print</th>
<th>Embroidery</th>
<th>Sewing</th>
<th>Finishing</th>
<th>Shipment</th>

</tr>

`;

querySnapshot.forEach((docItem)=>{

let data = docItem.data();

table.innerHTML += `

<tr>

<td>${data.buyer || ""}</td>

<td>${data.ikl || ""}</td>

<td>${data.style || ""}</td>

<td>

${data.totalQty || 0}

PCS

</td>

<td>${data.shipdate || ""}</td>

<td class="${getClass(data.Merchandising)}">

${data.Merchandising || "Pending"}

</td>

<td class="${getClass(data.Knitting)}">

${data.Knitting || "Pending"}

</td>

<td class="${getClass(data.Dyeing)}">

${data.Dyeing || "Pending"}

</td>

<td class="${getClass(data.Sample)}">

${data.Sample || "Pending"}

</td>

<td class="${getClass(data.Lab)}">

${data.Lab || "Pending"}

</td>

<td class="${getClass(data.Cutting)}">

${data.Cutting || "Pending"}

</td>

<td class="${getClass(data.Print)}">

${data.Print || "Pending"}

</td>

<td class="${getClass(data.Embroidery)}">

${data.Embroidery || "Pending"}

</td>

<td class="${getClass(data.Sewing)}">

${data.Sewing || "Pending"}

</td>

<td class="${getClass(data.Finishing)}">

${data.Finishing || "Pending"}

</td>

<td class="${getClass(data.Shipment)}">

${data.Shipment || "Pending"}

</td>

</tr>

`;

});

}

// STATUS COLOR

function getClass(status){

if(status === "Running"){

return "running";

}

else if(status === "Delay"){

return "delay";

}

else if(status === "Complete"){

return "complete";

}

else{

return "pending";

}

}

// LOAD DATA

loadDashboard();

</script>

</body>

</html>
